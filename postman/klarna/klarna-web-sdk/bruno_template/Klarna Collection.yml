id=\"klarna-sdk-button\"\n  style=\"width: 100%; display: none;\"\n  class=\"klarna-sdk-button theme-outlined shape-rect\"\n  aria-label=\"Continue with Klarna\"\n>\n  <div class=\"klarna-sdk-button__outline\" aria-hidden=\"true\"></div>\n  <div class=\"klarna-sdk-button__inner-container\">\n    <span class=\"klarna-sdk-button__text\">\n      <span class=\"klarna-sdk-button-copy\">Continue with</span>\n      <span class=\"klarna-sdk-button-badge\" aria-hidden=\"true\"></span>\n      <span class=\"klarna-sdk-button-text-logo\" aria-hidden=\"true\"></span>\n    </span>\n    <span class=\"klarna-sdk-button__spinner\" aria-hidden=\"true\"></span>\n  </div>\n</button>\n\n\n","jsContent":"(function () {\n    ''use strict'';\n\n    // ==========================================\n    // Configuration Constants\n    // ==========================================\n    const CONFIG = {\n        buttonSelector: ''#klarna-sdk-button'',\n        containerSelector: ''#klarna-payments-container'',\n        instanceId: ''klarna-widget'',\n        listenerAttribute: ''data-klarna-listener'',\n        loadingClass: ''klarna-sdk-button--loading''\n    };\n\n    // ==========================================\n    // State Management\n    // ==========================================\n    const state = {\n        initialized: false,\n        loaded: false,\n        paymentMethodIdentifiers: [],\n        klarnaButton: null,\n        initInProgress: false\n    };\n\n    // ==========================================\n    // Initialization Entry Point\n    // ==========================================\n    function init() {\n        // Check if button exists in DOM\n        state.klarnaButton = document.querySelector(CONFIG.buttonSelector);\n        if (!state.klarnaButton) {\n            console.warn(\"Klarna button not found in DOM\");\n            return;\n        }\n\n        // Prevent concurrent initialization\n        if (state.initInProgress) {\n            console.log(\"Initialization already in progress\");\n            return;\n        }\n\n        state.initInProgress = true;\n\n        // If already loaded, just show the button\n        if (state.loaded) {\n            console.log(\"Klarna widget already loaded, showing button\");\n            showButton();\n            // Reattach listener in case it was lost when switching iframes\n            attachButtonListener();\n            state.initInProgress = false;\n            return;\n        }\n\n        // Initialize Klarna SDK\n        if (!initializeKlarna()) {\n            state.initInProgress = false;\n            return;\n        }\n\n        // Parse payment methods\n        if (!parsePaymentMethods()) {\n            state.initInProgress = false;\n            return;\n        }\n\n        // Load payment widget\n        loadKlarnaWidget();\n    }\n\n    // ==========================================\n    // 1. Initialize Klarna SDK\n    // ==========================================\n    function initializeKlarna() {\n        try {\n            // Check if Klarna is already initialized\n            if (!window.Klarna || !window.Klarna.Payments) {\n                console.error(\"Klarna SDK not loaded\");\n                return false;\n            }\n\n            Klarna.Payments.init({\n                client_token: OpfContext.customFields.token\n            });\n            console.log(\"Klarna initialized successfully\");\n            state.initialized = true;\n            return true;\n        } catch (error) {\n            console.error(\"Error initializing Klarna:\", error);\n            return false;\n        }\n    }\n\n    // ==========================================\n    // 2. Parse Payment Methods\n    // ==========================================\n    function parsePaymentMethods() {\n        try {\n            const paymentMethodCategories = JSON.parse(\n                OpfContext.customFields.paymentMethodCategories\n            );\n            state.paymentMethodIdentifiers = paymentMethodCategories.map(\n                (category) => category.identifier\n            );\n            console.log(\"Payment methods parsed successfully\");\n            return true;\n        } catch (error) {\n            console.error(\"Error parsing payment method categories:\", error);\n            return false;\n        }\n    }\n\n    // ==========================================\n    // 3. Load Klarna Payment Widget\n    // ==========================================\n    function loadKlarnaWidget() {\n        console.log(\"Loading Klarna widget...\");\n        Klarna.Payments.load(\n            {\n                container: CONFIG.containerSelector,\n                payment_method_categories: state.paymentMethodIdentifiers,\n                instance_id: CONFIG.instanceId\n            },\n            {},\n            handleLoadResponse\n        );\n    }\n\n    // ==========================================\n    // Handle Load Response\n    // ==========================================\n    function handleLoadResponse(res) {\n        console.log(\"Klarna load response:\", res);\n\n        if (res.show_form) {\n            console.log(\"Klarna widget loaded successfully\");\n            state.loaded = true;\n            showButton();\n            attachButtonListener();\n        } else {\n            console.warn(\"Klarna widget not ready to show\");\n            hideButton();\n        }\n\n        state.initInProgress = false;\n    }\n\n    // ==========================================\n    // Show/Hide Button\n    // ==========================================\n    function showButton() {\n        if (state.klarnaButton) {\n            state.klarnaButton.style.display = '''';\n            console.log(\"Button displayed\");\n        }\n    }\n\n    function hideButton() {\n        if (state.klarnaButton) {\n            state.klarnaButton.style.display = ''none'';\n            console.log(\"Button hidden\");\n        }\n    }\n\n    // ==========================================\n    // Attach Button Event Listener\n    // ==========================================\n    function attachButtonListener() {\n        if (!state.klarnaButton) {\n            console.warn(\"Button not found, cannot attach listener\");\n            return;\n        }\n\n        // Check if listener already exists\n        if (state.klarnaButton.getAttribute(CONFIG.listenerAttribute) === ''true'') {\n            console.log(\"Button listener already attached\");\n            return;\n        }\n\n        // Remove any existing click listeners to prevent duplicates\n        const newButton = state.klarnaButton.cloneNode(true);\n        state.klarnaButton.parentNode.replaceChild(newButton, state.klarnaButton);\n        state.klarnaButton = newButton;\n\n        state.klarnaButton.setAttribute(CONFIG.listenerAttribute, ''true'');\n        state.klarnaButton.addEventListener(''click'', handleButtonClick);\n        console.log(\"Button listener attached successfully\");\n    }\n\n    // ==========================================\n    // Button Click Handler\n    // ==========================================\n    function handleButtonClick(e) {\n        e.preventDefault();\n        console.log(\"Klarna button clicked\");\n\n        // Set loading state\n        setButtonLoading(true);\n\n        Klarna.Payments.authorize(\n            {},\n            {\n                container: CONFIG.containerSelector,\n                payment_method_categories: state.paymentMethodIdentifiers,\n                instance_id: CONFIG.instanceId\n            },\n            handleAuthorizeResponse\n        );\n    }\n\n    // ==========================================\n    // Handle Authorization Response\n    // ==========================================\n    function handleAuthorizeResponse(res) {\n        console.log(\"Authorization response:\", res);\n\n        if (res.approved) {\n            console.log(\"Payment authorized successfully\");\n            makePayment(res.authorization_token);\n        } else {\n            console.error(\"Payment authorization failed\");\n            setButtonLoading(false);\n        }\n    }\n\n    // ==========================================\n    // Submit Payment\n    // ==========================================\n    function makePayment(authorizationToken) {\n        if (!authorizationToken) {\n            console.error(\"No authorization token provided\");\n            setButtonLoading(false);\n            return;\n        }\n\n        console.log(''Authorization Token:'', authorizationToken);\n\n        const submitBody = {\n            additionalData: [\n                { key: ''au_token'', value: authorizationToken }\n            ],\n            submitSuccess: (response) => {\n                console.log(''Payment successful:'', response);\n            },\n            submitPending: (response) => {\n                console.log(''Payment pending:'', response);\n            },\n            submitFailure: (response) => {\n                console.error(''Payment failed:'', response);\n                setButtonLoading(false);\n            },\n            submitCancel: (response) => {\n                console.log(''Payment cancelled:'', response);\n                setButtonLoading(false);\n                window.location.href = ''/checkout/opf-payment-and-review'';\n            }\n        };\n\n        try {\n            window.Opf.payments.checkout.submit(submitBody);\n        } catch (error) {\n            console.error(''Error submitting payment:'', error);\n            setButtonLoading(false);\n        }\n    }\n\n    // ==========================================\n    // Utility: Set Button Loading State\n    // ==========================================\n    function setButtonLoading(isLoading) {\n        if (!state.klarnaButton) return;\n\n        if (isLoading) {\n            state.klarnaButton.classList.add(CONFIG.loadingClass);\n            state.klarnaButton.disabled = true;\n        } else {\n            state.klarnaButton.classList.remove(CONFIG.loadingClass);\n            state.klarnaButton.disabled = false;\n        }\n    }\n\n    // ==========================================\n    // Initialize When DOM Is Ready\n    // ==========================================\n    function initWhenReady() {\n        if (document.readyState === ''loading'') {\n            document.addEventListener(''DOMContentLoaded'', init);\n        } else {\n            init();\n        }\n    }\n\n    // ==========================================\n    // Handle Visibility Change (iframe switching)\n    // ==========================================\n    document.addEventListener(''visibilitychange'', function() {\n        if (document.hidden === false) {\n            console.log(\"Page became visible, reinitializing Klarna...\");\n            // Reset init progress flag when returning to iframe\n            state.initInProgress = false;\n            init();\n        }\n    });\n\n    // ==========================================\n    // Initial Setup\n    // ==========================================\n    initWhenReady();\n\n})();","jsHash":"sha384-2h2WdXz6XaGl2LHgjiLDAzvPOXyrmFBQvYJQ6kQE63gDo3whLF4dFAH6sDdVDIjI","jsContextFields":[{"path":"${input.customFields.token}"},{"path":"${input.customFields.paymentMethodCategories}"}],"htmlContentMode":"SEPARATE","afterRedirectHtml":null,"afterRedirectHtmlContentMode":"MIXED","jsUrls":[{"url":"https://x.klarnacdn.net/kp/lib/v1/api.js","sri":"","attributes":[{"key":"async","value":"async"},{"key":"opf-load-once","value":"true"}]}]},"remoteApiOutboundMappings":[{"url":"https://${vars.apiUrl}/payments/v1/sessions","authenticationIds":["{{authentication_outbound_basic_auth_873}}","{{authentication_outbound_secure_random_token_outbound_872}}"],"method":"POST","requestContentType":"application/json","requestExample":"{\n  \"design\":\"hm\",\n  \"acquiring_channel\": \"ECOMMERCE\",\n  \"intent\": \"buy\",\n  \"purchase_coun
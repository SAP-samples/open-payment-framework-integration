"lineItemGroup":null,"mappingFieldType":"BODY","fixed":false,"isCustom":true,"persistCustomField":false,"isSensitive":false,"isObject":false,"isScript":false},{"from":"action.paymentData","to":"paymentData","map":null,"arrayPath":null,"arrayMapping":false,"lineItemGroup":null,"mappingFieldType":"BODY","fixed":false,"isCustom":true,"persistCustomField":true,"isSensitive":false,"isObject":false,"isScript":false}]},"responseContentType":"application/json","headers":{"Idempotency-Key":"${input.idempotencyKey}"},"formArrayIndicator":null}],"enabled":null,"configurationId":null,"googlePayGateway":null,"createdAt":"2025-12-10T03:09:51.946Z","updatedAt":"2025-12-10T03:09:51.946Z","dynamicScript":{"html":"<div id=\"googlepay-container\"></div>\n<br/>\n<div id=\"stored-card\"></div>\n<br/>\n<div id=\"card-container\"></div>\n<br/>\n<button \n      id=\"custom-pay-button\" \n      class=\"custom-pay-btn\">\n      COMPLETE PURCHASE \n</button>","jsContent":"(function () {\n\n    var orderId = OpfContext.orderId;\n    var referenceId = OpfContext.referenceId;\n    var amountInExponent = OpfContext.amountInExponent;\n    var currency = OpfContext.currency;\n    var resultURL = OpfContext.resultURL;\n    var language = OpfContext.contentLanguage;\n\n    const paymentMethodsResponse = JSON.parse(OpfContext.customFields.responseBody);\n\n\n    const languageMap = {\n        \"ja\": \"ja-JP\",    // Japanese to Japanese (Japan)\n        \"en\": \"en-US\",    // English to English (United States)\n        \"zh\": \"zh-CN\",    // Simplified Chinese (China) or you can map to zh-TW based on your situation\n        \"fr\": \"fr-FR\",    // French to French (France)\n        \"de\": \"de-DE\",    // German to German (Germany)\n        \"es\": \"es-ES\"     // Spanish to Spanish (Spain)\n        // more ,please refer to https://github.com/Adyen/adyen-web/tree/main/packages/server/translations\n    };\n    var contentLanguage = languageMap[language] || language;\n    console.log(''contentLanguage: '', contentLanguage);\n\n    var countryCode = OpfContext.billingAddress.country;\n\n\n    var clientKey = OpfContext.vars.clientKey;\n    var environment = OpfContext.vars.mode;\n\n    const hasContent = v => v != null && v.trim() !== '''';\n    const hasDelivery = (hasContent(OpfContext.shippingAddress.country) && hasContent(OpfContext.shippingAddress.city) && hasContent(OpfContext.shippingAddress.postalCode)) ?? false;\n\n    var isSaveForNextPayment = false; \n    var isSavedCard = false; //decide the shopper interactionvalue\n\n    const { AdyenCheckout, Card, GooglePay } = window.AdyenWeb;\n\n\n    //Flag to prevent duplicate submissions\n    var isSubmitting = false;\n\n\n    function submitSuccess(response, actions) {\n\n        console.log(''submitSuccess'');\n        //we must call resolve method in V6.\n        actions.resolve({ resultCode: ''Authorised'' });\n        isSubmitting = false;\n\n    }\n\n    function submitCancel(response) {\n\n        console.log(''submitCancel fired logic 2'');\n\n\n        window.Opf.payments.checkout.showInfoMessage(''Payment has been cancelled!'', 12000);\n        isSubmitting = false;\n\n\n    }\n\n    function submitPending(response, actions) {\n        console.log(''submitPending'');\n        if (response && response.customFields && response.customFields.length > 0) {\n            //retrive the resultCode and action parameters which mapped from psp response\n            const map = new Map(response.customFields.map(obj => [obj.key, obj.value]));\n\n            actions.resolve({ resultCode: map.get(''resultCode''), action: JSON.parse(map.get(''action'')) });\n\n        } else {\n            submitSuccess(response, actions);\n        }\n    }\n\n    function submitFail(error, actions) {\n        console.log(''submitFail'', error);\n        actions.reject();\n        isSubmitting = false;\n        // Reinitialize the payment form to allow retry\n        window.Opf.payments.checkout.reinitiatePaymentForm()\n            .then((success) => {\n                if (success) {\n                    console.log(''Payment form reinitialized successfully'');\n                    // Optionally refresh the payment form UI\n                    refreshPaymentFormUI();\n                }\n            })\n            .catch((error) => {\n                console.error(''Failed to reinitialize payment form:'', error);\n            });\n    }\n\n    function makePayment(data, actions) {\n        console.log(''hosted-fields makePayment'',data);\n\n\n\n        if (!hasDelivery && \"zip\" == data.paymentMethod.type) {\n            data.paymentMethod.clickAndCollect = true;\n\n        }\n\n        console.log(''clickAndCollect'', data.paymentMethod.clickAndCollect);\n\n        var returnUrl = new URL(resultURL);\n        returnUrl.searchParams.set(''paymentMethod'', data.paymentMethod.type);\n\n        if (data.storePaymentMethod !== undefined) {\n            isSaveForNextPayment = data.storePaymentMethod;\n        }\n\n       \n\n        const pm = data?.paymentMethod ?? {};\n        const type = pm.type;\n        // please contact SAP #caas-bamboo team if you need to other payment method like googlepay, etc.\n        const KEYS_BY_TYPE = {\n            scheme: [\n                ''type'',\n                ''brand'',\n                ''holderName'',\n                ''encryptedCardNumber'',\n                ''encryptedExpiryMonth'',\n                ''encryptedExpiryYear'',\n                ''encryptedSecurityCode'',\n                ''checkoutAttemptId'',\n                ''storedPaymentMethodId''\n            ],\n            googlepay: [\n                ''type'',\n                ''googlePayToken'',\n                ''checkoutAttemptId'',\n                ''googlePayCardNetwork''\n            ]\n        };\n\n        function addIfDefined(arr, key, value) {\n            if (value !== undefined && value !== null && value !== '''') {\n                arr.push({ key, value });\n            }\n        }\n\n        let additionalData = [];\n\n        const selectedKeys = KEYS_BY_TYPE[type];\n\n        for (const k of selectedKeys) {\n            addIfDefined(additionalData, k, pm[k]);\n        }\n\n\n       \n\n        var submitBody = {\n            ''savePaymentMethod'':isSaveForNextPayment,\n            ''additionalData'': additionalData,\n            ''submitSuccess'': function (response) {\n                submitSuccess(response, actions);\n            },\n            ''submitPending'': function (response) {\n                submitPending(response, actions);\n            },\n            ''submitFailure'': function (error) {\n                submitFail(error, actions);\n            },\n            ''submitCancel'': function (error) {\n                submitCancel(error, actions);\n            }\n        }\n        console.log(''before submit'');\n\n        return window.Opf.payments.checkout.submit(submitBody);\n    }\n\n    function makeDetailsCall(data, actions) {\n        console.log(''hosted-fields makeDetailsCall'');\n\n        var additionalData = [\n            { ''key'': ''paymentData'', ''value'': data.paymentData || '''' },\n            { ''key'': ''threeDSResult'', ''value'': data.details.threeDSResult }\n        ];\n        var submitCompleteBody = {\n            ''additionalData'': additionalData,\n            ''submitSuccess'': function (response) {\n                submitSuccess(response, actions);\n            },\n            ''submitPending'': function (response) {\n                submitPending(response, actions);\n            },\n            ''submitFailure'': function (error) {\n                submitFail(error, actions);\n            },\n            ''submitCancel'': function (error) {\n                submitCancel(error, actions);\n            }\n        }\n        console.log(''before submitComplete'');\n        isSubmitting = false;\n\n        return window.Opf.payments.checkout.submitComplete(submitCompleteBody);\n    }\n\n    const configuration = {\n\n        paymentMethodsResponse: paymentMethodsResponse, // The `/paymentMethods` response from the server.\n        clientKey: clientKey,\n        locale: contentLanguage,\n        environment: environment,\n        countryCode: countryCode,\n        //showPayButton: false,//call .submit flow on your own button\n\n        amount: {\n            value: amountInExponent,\n            currency: currency\n        },\n\n        onSubmit: (state, component, actions) => {\n            // Your function calling your server to make the `/payments` request\n            console.log(''onSubmit'');\n            makePayment(state.data, actions);\n        },\n\n        onAdditionalDetails: (state, component, actions) => {\n            // Your function calling your server to make a `/payments/details` request\n            makeDetailsCall(state.data, actions);\n        },\n        onPaymentCompleted: (result, component) => {\n            console.log(''onPaymentCompleted'', result);\n            isSubmitting = false;\n        },\n        onPaymentFailed: (result, component) => {\n            isSubmitting = false;\n\n        },\n        onError: (error, component) => {\n            isSubmitting = false;\n\n        }\n    };\n\n    \n\n    const cardConfiguration = {\n        showBrandIcon: true,\n        enableStoreDetails: true,\n        billingAddressRequired: false, // When true show the billing address input fields and mark them as required.\n        hasHolderName: true,\n        holderNameRequired: true,\n        showPayButton: false,\n        brands: [''mc'', ''visa'', ''amex'', ''maestro''],\n        //minimumExpiryDate: ''01/26'',\n        name: \"Credit or debit card\",\n        amount: {\n            value: amountInExponent,\n            currency: currency,\n        },\n        placeholders: {\n            cardNumber: ''1234 5678 9012 3456'',\n            expiryDate: ''MM/YY'',\n            securityCodeThreeDigits: ''123'',\n            securityCodeFourDigits: ''1234'',\n            holderName: ''J. Smith''\n        },\n        onChange: (state, component) => {\n            //console.log(''Card state changed:'', state);\n        },\n        onBinValue: (event) => {\n            console.log(''update to your OnBinValue log and remove this log  :'', event.binValue);\n        },\n        onBrand: (event) => {\n            console.log(''update to your onBrand log and remove this log  :'', event.brand);\n        },\n        onBinLookup: (event) => {\n            console.log(''update to your onBinLookup log and remove this log  :'', event.supportedBrands);\n        },\n        onFieldValid: (event) => {\n            console.log(''update to your onFieldValid log and remove this log  :'', event.valid);\n        },\n\n    };\n\n    const googlePayConfiguration = {\n    amount: {\n        value: amountInExponent,\n        currency: currency\n    },\n    countryCode: countryCode,\n    //Set this to PRODUCTION when you are ready to accept live payments\n    environment: environment,\n    authenticationData:{threeDSRequestData:{nativeThreeDS:''preferred''}},\n    origin: resultURL\n      \n};\n\n\n    //const card component;\n    let card;\n    let googlePayComponent;\n    let storedCard;\n\n    const adyenCheckout = AdyenCheckout(configuration);\n    adyenCheckout.then(data => {\n        card = new Card(data, cardConfiguration).mount(''#card-container'');\n        //disabled applepay by default\n       googlePayComponent = new GooglePay(data, googlePayConfiguration).mount(''#googlepay-container'');\n      \n      const storedCardPaymentMehotd = data.paymentMethodsResponse.storedPaymentMethods.find(\n  paymentMethod => paymentMethod.type === ''scheme''\n);\n     console.log(\"storedPaymentMethods? \", storedCardPaymentMehotd);   \n      \n      if (!storedCardPaymentMehotd) {\n    document.getElementById(''stored-card'').innerHTML = ''<div>No stored cards found</div>'';\n    return;\n  }\n        storedCard = new Card(data,storedCardPaymentMehotd,{\n        \n  });\n\n\n  storedCard.mount(''#stored-card'');\n\n    });\n\n     \n\n\n    //\n    const payButton = document.getElementById(''custom-pay-button'');\n    payButton.addEventListener(''click'', (event) => {\n        event.preventDefault();\n\n        if (!card) {\n            console.log(\"!card isSubmitting \", isSubmitting);\n            isSubmitting = false;\n            return;\n        }\n\n        if (isSubmitting) {\n            console.log(\" isSubmitting \", isSubmitting);\n            return;\n        }\n\n        isSubmitting = true;\n        const submitPromise = card.submit();\n\n        if (submitPromise && typeof submitPromise.then === ''function'') {\n            submitPromise\n                .then((result) => {\n                    console.log(''Card submit initiated successfully'');\n                })\n                .catch((error) => {\n                    console.error(''Card submit error:'', error);\n                    isSubmitting = false;\n\n\n                });\n        } else {\n\n            isSubmitting = false;\n        }\n    });\n\n\n})();\n","jsHash":"sha384-EGxAcR5YR2IUcP4XDK6uyPONUvML2N4TlK91d/RiBzK2JpXDFVKc5+iuecMjtBxx","jsContextFields":[{"path":"${input.orderId}"},{"path":"${input.referenceId}"},{"path":"${input.currency}"},{"path":"${input.amountInExponent}"},{"path":"${input.contentLanguage}"},{"path":"${input.resultURL}"},{"path":"${input.customFields.responseBody}"},{"path":"${vars.clientKey}"},{"path":"${input.billingAddress.country}"},{"path":"${vars.mode}"},{"path":"${input.shippingAddress.country}"},{"path":"${input.shippingAddress.city}"},{"path":"${input.shippingAddress.postalCode}"}],"cssContent":".custom-pay-btn {\n  width: 100%;\n  padding: 16px;\n  background-color: #000000;\n  color: white;\n  border: none;\n  border-radius: 6px;\n  font-size: 16px;\n  font-weight: 600;\n  cursor: pointer;\n  transition: all 0.3s ease;\n  margin-bottom: 15px;\n}\n\n\n","cssHash":"sha384-ezVimRj9vGDUwKZfaw+C65eTKFhRTx/ffqJ3qJrfU3Qj5eIfDjusTlI+ih7mvufn","cssUrl":"payment-form-e7429089-ade5-4e1d-99e7-7859da631127-style.css","htmlContentMode":"SEPARATE","afterRedirectHtml":"","afterRedirectJsContent":"    console.log(''After redirect script'');\n    (function(){\n        console.log(''After redirect script invoked'');\n        const REDIRECTRESULT = ''redirectResult'';\n        const PAYLOAD = ''payload'';\n        const MD = ''MD'';\n        const PARES = ''PaRes'';\n        \n        function submitSuccess(response) {}\n\n        function submitPending(response) {}\n\n        function submitFail(error) {\n        console.log(error);\n          console.log(''error fired'');\n        }\n\n        function makeDetailsCall(data) {\n            var additionalData = [\n                { ''key'': ''details'', ''value'': data.details }\n            ];\n            var submitCompleteBody = {\n                ''additionalData'': additionalData,\n                ''submitSuccess'': submitSuccess,\n                ''submitPending'': submitPending,\n                ''submitFailure'': submitFail,\n                ''submitCancel'': function(response){\n             window.location.href = ''/checkout/opf-payment-and-review'';\n              }\n              \n            }\n            return window.Opf.payments.redirect.submitCompleteRedirect(submitCompleteBody);\n        }\n        \n        console.log(window.Opf.payments);\n        var queryList = window.Opf.payments.redirect.getRedirectParams();\n        var queryParams = new Map();\n        for(var i = 0; i < queryList.length; i++) {\n            queryParams.set(queryList[i].key, queryList[i].value);\n        }\n        if (queryParams && queryParams.size > 0) {\n            var data;\n            if (queryParams.get(REDIRECTRESULT)) {\n                data = {\n                    ''details'': {\n                        ''redirectResult'': queryParams.get(REDIRECTRESULT)\n                    }\n                };\n
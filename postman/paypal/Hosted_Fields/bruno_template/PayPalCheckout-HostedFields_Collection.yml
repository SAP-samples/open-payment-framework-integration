\\/\", \"/\"));\n            return OpfContext.customFields.orderId;\n        },\n        async onApprove(data, actions) {\n            try {\n                const response = await completePayment();\n\n                const getIssueValue = (response) => {\n                    if (response && response.customFields && response.customFields.length > 0) {\n                        const issueField = response.customFields.find(field => field.key === ''paypalIssue'');\n                        return issueField ? issueField.value : null;\n                    }\n                    return null;\n                };\n\n                const errorDetail = getIssueValue(response);\n\n                console.log(''errorDetail--->'', errorDetail);\n\n                if (errorDetail?.issue === \"INSTRUMENT_DECLINED\") {\n                    return actions.restart();\n                } else if (errorDetail) {\n                    throw new Error(\n                        `${errorDetail.description} (${orderData.debug_id})`\n                    );\n                } else {\n                    console.log(''ok!'');\n                }\n\n            } catch (error) {\n                console.error(error);\n            }\n        },\n    });\n\n    paypalButtons.render(\"#paypal-button-container\");\n\n})();\n","jsHash":"sha384-Gv+SSQBg6WErvdo3lndKCnrleg3mo9GU8EkxZB71iK8z5g1JofjZgZcSAh5krAI9","jsContextFields":[{"path":"${input.customFields.approveHref}"},{"path":"${input.customFields.orderId}"},{"path":"${input.amount}"}],"htmlContentMode":"SEPARATE","afterRedirectHtml":null,"afterRedirectHtmlContentMode":"SEPARATE","jsUrls":[{"url":"https://www.paypal.com/sdk/js?client-id=${vars.clientId}&intent=authorize&buyer-country=US&currency=${input.currency}&components=buttons&enable-funding=${vars.enableFunding}&disable-funding=${vars.disableFunding}","sri":"","attributes":[{"key":"opf-load-once","value":"true"}]}]},"remoteApiOutboundMappings":[{"url":"https://${vars.apiEndpoint}/${vars.api
"fixed":true,"isCustom":false,"persistCustomField":false,"isSensitive":false,"isObject":true,"isScript":false},{"from":"payment.paymentOutput.cardPaymentMethodSpecificOutput.acquirerInformation.name","to":null,"map":null,"arrayPath":null,"arrayMapping":false,"lineItemGroup":null,"mappingFieldType":"BODY","fixed":true,"isCustom":false,"persistCustomField":false,"isSensitive":false,"isObject":false,"isScript":false},{"from":"payment.paymentOutput.cardPaymentMethodSpecificOutput.token","to":null,"map":null,"arrayPath":null,"arrayMapping":false,"lineItemGroup":null,"mappingFieldType":"BODY","fixed":true,"isCustom":false,"persistCustomField":false,"isSensitive":false,"isObject":false,"isScript":false},{"from":"payment.paymentOutput.amountOfMoney.#object","to":null,"map":null,"arrayPath":null,"arrayMapping":false,"lineItemGroup":null,"mappingFieldType":"BODY","fixed":true,"isCustom":false,"persistCustomField":false,"isSensitive":false,"isObject":true,"isScript":false},{"from":"payment.paymentOutput.amountOfMoney.amount","to":null,"map":null,"arrayPath":null,"arrayMapping":false,"lineItemGroup":null,"mappingFieldType":"BODY","fixed":true,"isCustom":false,"persistCustomField":false,"isSensitive":false,"isObject":false,"isScript":false},{"from":"payment.paymentOutput.amountOfMoney.currencyCode","to":null,"map":null,"arrayPath":null,"arrayMapping":false,"lineItemGroup":null,"mappingFieldType":"BODY","fixed":true,"isCustom":false,"persistCustomField":false,"isSensitive":false,"isObject":false,"isScript":false},{"from":"payment.paymentOutput.customer.#object","to":null,"map":null,"arrayPath":null,"arrayMapping":false,"lineItemGroup":null,"mappingFieldType":"BODY","fixed":true,"isCustom":false,"persistCustomField":false,"isSensitive":false,"isObject":true,"isScript":false},{"from":"payment.paymentOutput.customer.device.#object","to":null,"map":null,"arrayPath":null,"arrayMapping":false,"lineItemGroup":null,"mappingFieldType":"BODY","fixed":true,"isCustom":false,"persistCustomField":false,"isSensitive":false,"isObject":true,"isScript":false},{"from":"payment.paymentOutput.customer.device.ipAddressCountryCode","to":null,"map":null,"arrayPath":null,"arrayMapping":false,"lineItemGroup":null,"mappingFieldType":"BODY","fixed":true,"isCustom":false,"persistCustomField":false,"isSensitive":false,"isObject":false,"isScript":false},{"from":"#object","to":null,"map":null,"arrayPath":null,"arrayMapping":false,"lineItemGroup":null,"mappingFieldType":"BODY","fixed":true,"isCustom":false,"persistCustomField":false,"isSensitive":false,"isObject":true,"isScript":false}]},"responseContentType":"application/json","headers":{"X-GCS-Idempotence-Key":"${input.idempotencyKey}","Authorization":"GCS v1HMAC:${vars.apiKey}:${auth.hmac.signature}","Date":"${auth.hmac.hmacFields.date}","Content-Type":"${vars.definedContextType}"},"formArrayIndicator":null}],"enabled":null,"configurationId":null,"googlePayGateway":null,"createdAt":"2025-12-25T08:17:34.577Z","updatedAt":"2025-12-25T08:17:34.577Z","dynamicScript":{"html":"<div id=\"payment-section\" class=\"opfPayone-wrapper\">\n\n  <!-- Saved Cards Section -->\n  <div id=\"saved-cards-section\" class=\"opfPayone-saved-cards-section\" style=\"display: none;\">\n    <div id=\"saved-cards-list\" class=\"opfPayone-saved-cards-list\"></div>\n  </div>\n\n  <!-- New Card Option (no radio) -->\n  <div class=\"opfPayone-new-card-option\" id=\"new-card-option\" style=\"display: none;\">\n  <div class=\"opfPayone-new-card-label\" id=\"new-card-trigger\">\n    <span> New Card</span>\n  </div>\n</div>\n\n  <!-- PAYONE Form Container -->\n  <div id=\"payone-form-container\" class=\"opfPayone-form-container\">\n    <div id=\"div-hosted-tokenization-wrapper\" class=\"opfPayone-hosted-tokenization-wrapper opfPayone-visible\">\n      <div id=\"div-hosted-tokenization\"></div>\n    </div>\n  </div>\n\n  <button id=\"payment-submit-btn\" class=\"opfPayone-payment-submit-btn\" type=\"button\">\n    Pay Now\n  </button>\n</div>","jsContent":"var hostedTokenizationUrl = OpfContext.redirectUrl;\n\nhostedTokenizationUrl = JSON.parse(''\"'' + hostedTokenizationUrl.replace(/\"/g, ''\\\"'') + ''\"'');\n\nvar tokenizer = null;\nvar currentSelectedToken = null;\nvar savedTokens = [];\nvar tokenizerReady = false;\n\n\nfunction init() {\n  \n\n  savedTokens = OpfContext.savedPaymentMethods || [];\n  \n  console.log(\"saved card \",savedTokens);\n  \n  if (savedTokens && savedTokens.length > 0) {\n    renderSavedCardList();\n    var savedCardsSection = document.getElementById(''saved-cards-section'');\n    if (savedCardsSection) {\n      savedCardsSection.style.display = ''block'';\n    }\n    // show new card option if there are saved cards\n    var newCardOption = document.getElementById(''new-card-option'');\n    if (newCardOption) {\n      newCardOption.style.display = ''block'';\n    }\n  }\n  initTokenizer();\n}\n\nfunction initTokenizer() {\n  \n  tokenizer = new Tokenizer(\n    hostedTokenizationUrl,\n    ''div-hosted-tokenization'',\n    {\n      hideTokenFields: false,\n      hideCardholderName: false\n    }\n  );\n\n  tokenizer.initialize()\n    .then(function () {\n      tokenizerReady = true;\n      console.log(''PAYONE Tokenizer ready'');\n      \n      ensureFormVisible();\n      \n      var submitBtn = document.getElementById(''payment-submit-btn'');\n      if (submitBtn) {\n        submitBtn.classList.add(''opfPayone-visible'');\n      }\n    })\n    .catch(function (reason) {\n      console.error(''Tokenizer init failed:'', reason);\n    });\n}\n\nfunction ensureFormVisible() {\n  var wrapper = document.getElementById(''div-hosted-tokenization-wrapper'');\n  if (wrapper) {\n    wrapper.classList.add(''opfPayone-visible'');\n  }\n}\n\nfunction renderSavedCardList() {\n  var container = document.getElementById(''saved-cards-list'');\n  if (!container) {\n    console.error(\"saved-cards-list is missing in the DOM\");\n    return;\n  }\n  \n  container.innerHTML = '''';\n\n  savedTokens.forEach(function (card, index) {\n    var row = createSavedCardRow(card, index);\n    container.appendChild(row);\n  });\n}\n\nfunction createSavedCardRow(card, index) {\n  var row = document.createElement(''div'');\n  row.className = ''opfPayone-saved-card-row'';\n  row.dataset.cardIndex = index;\n  row.dataset.cardToken = card.pspPaymentMethodId;\n\n  var brand = card.cardType || ''VISA'';\n\n  // Card brand text only\n  var brandText = document.createElement(''span'');\n  brandText.textContent = formatCardBrandName(brand);\n  brandText.className = ''opfPayone-card-brand'';\n\n  // Holder name\n  var holderName = document.createElement(''span'');\n  holderName.textContent = card.cardHolderName || '''';\n  holderName.className = ''opfPayone-card-holder'';\n\n  // Masked number\n  var maskedNum = document.createElement(''span'');\n  var displayNumber = card.cardLast4 || ''\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022'';\n  maskedNum.textContent = formatMaskedNumber(displayNumber);\n  maskedNum.className = ''opfPayone-masked-number'';\n\n  // Expiry\n  var expiry = document.createElement(''span'');\n  expiry.textContent = card.cardExpiryDate;\n  expiry.className = ''opfPayone-card-expiry'';\n\n  // Checkmark indicator\n  var checkmark = document.createElement(''span'');\n  checkmark.textContent = ''✓'';\n  checkmark.id = ''checkmark-'' + index;\n  checkmark.className = ''opfPayone-card-checkmark'';\n\n  row.appendChild(brandText);\n  row.appendChild(holderName);\n  row.appendChild(maskedNum);\n  row.appendChild(expiry);\n  row.appendChild(checkmark);\n\n  row.addEventListener(''click'', function () {\n    selectSavedCard(card, index);\n  });\n\n  return row;\n}\n\n\nfunction selectSavedCard(card, index) {\n  if (!tokenizerReady) {\n    console.warn(\"Tokenizer is not ready yet\");\n    return;\n  }\n\n  currentSelectedToken = card.pspPaymentMethodId;\n  \n  if (tokenizer.useToken) {\n    tokenizer.useToken(card.pspPaymentMethodId);\n  }\n  \n  updateSavedCardState(index);\n  ensureFormVisible();\n}\n\nfunction selectNewCard() {\n  if (!tokenizerReady) {\n    console.warn(\"Tokenizer is not ready yet\");\n    return;\n  }\n\n  currentSelectedToken = null;\n  \n  if (tokenizer.useToken) {\n    tokenizer.useToken();\n  }\n  \n  clearSavedCardSelection();\n  ensureFormVisible();\n}\n\nfunction updateSavedCardState(selectedIndex) {\n  var allRows = document.querySelectorAll(''.opfPayone-saved-card-row'');\n  allRows.forEach(function (row, idx) {\n    row.classList.remove(''opfPayone-selected'');\n    var checkmark = document.getElementById(''checkmark-'' + idx);\n    if (checkmark) {\n      checkmark.classList.remove(''opfPayone-visible'');\n    }\n  });\n  \n  var selectedRow = document.querySelector(''.opfPayone-saved-card-row[data-card-index=\"'' + selectedIndex + ''\"]'');\n  if (selectedRow) {\n    selectedRow.classList.add(''opfPayone-selected'');\n    var checkmark = document.getElementById(''checkmark-'' + selectedIndex);\n    if (checkmark) {\n      checkmark.classList.add(''opfPayone-visible'');\n    }\n  }\n}\n\nfunction clearSavedCardSelection() {\n  var allRows = document.querySelectorAll(''.opfPayone-saved-card-row'');\n  allRows.forEach(function (row, idx) {\n    row.classList.remove(''opfPayone-selected'');\n    var checkmark = document.getElementById(''checkmark-'' + idx);\n    if (checkmark) {\n      checkmark.classList.remove(''opfPayone-visible'');\n    }\n  });\n}\n\n// update this fuction based on your side\nfunction formatCardBrandName(brand) {\n  var names = {\n    ''VISA'': ''Visa'',\n    ''MASTERCARD'': ''MasterCard'',\n    ''AMEX'': ''American Express'',\n    ''MAESTRO'': ''Maestro'',\n  };\n  return names[(brand || '''').toUpperCase()] || brand;\n}\n\nfunction formatMaskedNumber(maskedNumber) {\n  if (!maskedNumber) {\n    return ''\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022'';\n  }\n  var dots = ''\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022'';\n  return dots + maskedNumber;\n}\n\nfunction makePayment(hostedTokenizationId) {\n  \n  var additionalData = [{ ''key'': ''hostedTokenizationId'', ''value'': hostedTokenizationId }];\n  var submitBody = {\n    ''additionalData'': additionalData,\n    ''submitSuccess'': function (response) {\n      console.log(''submitSuccess'');\n    },\n    ''submitPending'': function (response) {\n      console.log(''submitPending'');\n\n      if (response && response.customFields && response.customFields.length > 0) {\n        const map = new Map(response.customFields.map(obj => [obj.key, obj.value]));\n        var redirectDataURL = map.get(''redirectDataURL'');\n\n        if (redirectDataURL) {\n          Opf.payments.checkout.handle3DSRedirect(redirectDataURL);\n        }\n      }\n    },\n    ''submitFailure'': function (response) {\n      window.Opf.payments.checkout.reinitiatePaymentForm()\n            .then((success) => {\n                if (success) {\n                    console.log(''Payment form reinitialized successfully'');\n                    // Optionally refresh the payment form UI\n                    refreshPaymentFormUI();\n                }\n            })\n            .catch((error) => {\n                console.error(''Failed to reinitialize payment form:'', error);\n            });\n      console.log(''submitFailure'');\n    },\n    ''submitCancel'': function (response) {\n      window.location.href = ''/checkout/opf-payment-and-review'';\n    }\n  };\n  window.Opf.payments.checkout.submit(submitBody);\n}\n\nfunction setupEventListeners() {\n\n  var newCardTrigger = document.getElementById(''new-card-trigger'');\n  if (newCardTrigger) {\n    newCardTrigger.addEventListener(''click'', function () {\n      selectNewCard();\n    });\n  }\n\n  var paymentSubmitBtn = document.getElementById(''payment-submit-btn'');\n  if (paymentSubmitBtn) {\n    paymentSubmitBtn.addEventListener(''click'', function () {\n      if (tokenizer && tokenizerReady) {\n        tokenizer.submitTokenization()\n          .then(function (result) {\n            if (result.success) {\n              makePayment(result.hostedTokenizationId);\n            } else {\n              console.error(''Tokenization failed:'', result.error.message);\n            }\n          })\n          .catch(function (error) {\n            console.error(''Tokenization error:'', error);\n          });\n      } else {\n        console.error(''Tokenizer not ready'');\n      }\n    });\n  }\n}\n\nif (document.readyState === ''loading'') {\n  document.addEventListener(''DOMContentLoaded'', function () {\n    init();\n    setupEventListeners();\n  });\n} else {\n  init();\n  setupEventListeners();\n}","jsHash":"sha384-Zy+jOXskm1DJ/+V2ksaSC0LTL1ts01RZfx0LEb81tzpGLzFXIxGKMTUMTHwfMByj","jsContextFields":[{"path":"${input.redirectUrl}"},{"path":"${input.savedPaymentMethods[*].pspPaymentMethodId}"},{"path":"${input.savedPaymentMethods[*].cardHolderName}"},{"path":"${input.savedPaymentMethods[*].cardLast4}"},{"path":"${input.savedPaymentMethods[*].cardType}"},{"path":"${input.savedPaymentMethods[*].cardExpiryDate}"}],"cssContent":"* Payone Payment Module Styles - Fully Scoped */\n.opfPayone-wrapper {\n  font-family: Arial, sans-serif;\n}\n\n.opfPayone-wrapper * {\n  box-sizing: border-box;\n}\n\n/* ========== Saved Cards Section ========== */\n.opfPayone-saved-cards-section {\n  margin-bottom: 16px;\n}\n\n.opfPayone-saved-cards-list {\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n}\n\n.opfPayone-saved-card-row {\n  display: flex;\n  align-items: center;\n  gap: 16px;\n  padding: 14px 20px;\n  cursor: pointer;\n  border: 1px solid #e0e0e0;\n  border-radius: 6px;\n  background-color: #fff;\n  transition: all 0.2s ease;\n}\n\n.opfPayone-saved-card-row:hover {\n  background-color: #f9f9f9;\n  border-color: #0066cc;\n}\n\n.opfPayone-saved-card-row.opfPayone-selected {\n  background-color: #f0f7ff;\n  border-color: #0066cc;\n}\n\n.opfPayone-card-brand {\n  font-weight: 700;\n  color: #0066cc;\n  min-width: 120px;\n  flex-shrink: 0;\n  font-size: 14px;\n}\n\n.opfPayone-card-holder {\n  font-size: 13px;\n  color: #555;\n  min-width: 100px;\n  flex-shrink: 0;\n}\n\n.opfPayone-card-holder:empty {\n  display: none;\n}\n\n\n.opfPayone-masked-number {\n  flex: 1;\n  color: #888;\n  font-family: ''Courier New'', monospace;\n  font-size: 14px;\n  letter-spacing: 2px;\n  text-align: right;\n  padding-right: 20px;\n}\n\n.opfPayone-card-expiry {\n  color: #888;\n  font-size: 13px;\n  min-width: 70px;\n  text-align: right;\n  flex-shrink: 0;\n}\n\n.opfPayone-card-checkmark {\n  color: #0066cc;\n  font-weight: bold;\n  font-size: 18px;\n  width: 24px;\n  text-align: center;\n  flex-shrink: 0;\n  display: none;\n}\n\n.opfPayone-card-checkmark.opfPayone-visible {\n  display: block;\n}\n\n/* ========== New Card Option ========== */\n.opfPayone-new-card-option {\n  margin-bottom: 16px;\n}\n\n.opfPayone-new-card-label {\n  display: inline-flex;\n  align-items: center;\n  cursor: pointer;\n  padding: 12px 0;\n}\n\n.opfPayone-new-card-label span {\n  font-size: 14px;\n  color: #0066cc;\n  font-weight: 600;\n}\n\n.opfPayone-new-card-label:hover span {\n  text-decoration: underline;\n}\n\n/* ========== PAYONE Form Container ========== */\n.opfPayone-form-container {\n  margin-top: 16px;\n  width: 100%;\n}\n\n.opfPayone-hosted-tokenization-wrapper {\n  display: none;\n  width: 100%;\n  margin-bottom: 16px;\n}\n\n.opfPayone-hosted-tokenization-wrapper.opfPayone-visible {\n  display: block;\n}\n\n.opfPayone-hosted-tokenization-wrapper iframe,\n#div-hosted-tokenization iframe {\n  width: 100% !important;\n  max-width: 100% !important;\n}\n\n#div-hosted-tokenization {\n  width: 100%;\n}\n\n/* ========== Payment Submit Button ========== */\n.opfPayone-payment-submit-btn {\n  display: none;\n  padding: 10px 20px;\n  background-color: #0066cc;\n  color: #fff;\n  border: none;\n  border-radius: 4px;\n  cursor: pointer;\n  font-size: 14px;\n  font-weight: 600;